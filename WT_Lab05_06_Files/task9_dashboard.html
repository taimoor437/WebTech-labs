<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
    /* Dashboard */
.dashboard{display:grid;grid-template-columns:250px 1fr;min-height:80vh}
.sidebar{background:#333;color:white;padding:20px}
.main{padding:20px}
.stats{display:flex;gap:20px;flex-wrap:wrap}
.stat{flex:1;background:white;padding:20px;border:1px solid #ddd}

</style>
</head>
<body>

<div class="dashboard">

<div class="sidebar">
<h2>Menu</h2>
<p>Dashboard</p>
<p>Users</p>
<p>Settings</p>
</div>

<div class="main">
<h1>Admin Dashboard</h1>

<div class="stats">
<div class="stat">Users: 120</div>
<div class="stat">Sales: 540</div>
<div class="stat">Orders: 87</div>
</div>

</div>

</div>

</body>
</html>
